<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTTS Edge Radar</title>

<style>
body{
font-family:system-ui,-apple-system,sans-serif;
background:#07133a;
color:white;
padding:20px;
margin:0;
}

h1{
margin-top:40px;
font-size:32px;
}

button{
background:#2f6df6;
color:white;
border:none;
border-radius:14px;
padding:18px 24px;
font-size:18px;
margin:20px 0;
}

.card{
background:#11204f;
border-radius:14px;
padding:16px;
margin-bottom:12px;
}

.bet{background:#0f5132;}
.pass{background:#3a1d1d;}
.review{background:#4b3a12;}
.nodata{background:#4a1f1f;}
</style>

</head>

<body>

<h1>BTTS Edge Radar</h1>

<button onclick="scan()">Refresh Scan</button>

<div id="status">Tap refresh to scan.</div>
<div id="results"></div>

<script>

async function scan(){

const status=document.getElementById("status");
const results=document.getElementById("results");

status.textContent="Scanning...";
results.innerHTML="";

try{

const res=await fetch("/scan");

if(!res.ok){
status.textContent="Error "+res.status;
return;
}

const data=await res.json();

if(data.length===0){
status.textContent="Scan worked but no matches returned.";
return;
}

status.textContent="Found "+data.length+" results.";

data.forEach(item=>{

const card=document.createElement("div");

let cls="card pass";

if(item.signal==="BET")cls="card bet";
if(item.signal==="REVIEW")cls="card review";
if(item.signal==="NO DATA")cls="card nodata";

card.className=cls;

card.innerHTML = `
  <div style="font-size:26px; font-weight:700; margin-bottom:10px;">
    ${item.match ?? "Unknown match"}
  </div>

  <div style="font-size:22px; font-weight:600; margin-bottom:14px; color:#c7d7ff;">
    Bet: ${item.market ?? "-"} ${item.side ?? ""}
  </div>

  <div style="font-size:18px; margin-bottom:8px;">
    True Prob: <strong>${item.true_prob ?? "-"}</strong>${item.true_prob !== "-" ? "%" : ""}
  </div>

  <div style="font-size:18px; margin-bottom:8px;">
    Book: ${item.books ?? "-"}
  </div>

  <div style="font-size:16px; opacity:0.9; margin-bottom:10px;">
    ${item.notes ?? ""}
  </div>

  <div style="font-size:15px; opacity:0.75;">
    Kalshi Price: ${item.kalshi_price ?? "-"} | Edge: ${item.edge ?? "-"} | Signal: ${item.signal ?? "-"}
  </div>
`;
`;

results.appendChild(card);

});

}

catch(err){
status.textContent="Network error "+err;
}

}

</script>

</body>
</html>
