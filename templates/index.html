<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Edge Radar</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #07133a;
      color: white;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 40px;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    button {
      background: #3b6df6;
      color: white;
      border: none;
      border-radius: 18px;
      padding: 20px 28px;
      font-size: 24px;
      font-weight: 600;
      margin: 24px 0;
      width: 320px;
      max-width: 100%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    #status {
      margin: 10px 0 20px 0;
      font-size: 16px;
      opacity: 0.9;
    }

    .card {
      background: #1a234f;
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .obvious {
      background: #0d4027;
      border: 2px solid #43e28d;
    }

    .bet {
      background: #133d2a;
      border: 2px solid #2bd97f;
    }

    .watch {
      background: #4b3a12;
      border: 2px solid #c9a227;
    }

    .pass {
      background: #3b1d22;
      border: 2px solid #6b2a35;
    }

    .match {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .betline {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #c7d7ff;
    }

    .meta {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .notes {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .footer {
      font-size: 15px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <h1>Market Edge Radar</h1>
  <div class="subtitle">Best bet per match across leagues</div>

  <button id="scanButton">Refresh Scan</button>

  <div id="status">Tap refresh to scan.</div>
  <div id="results"></div>

  <script>
    async function scan() {
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.textContent = "Scanning...";
      results.innerHTML = "";

      try {
        const res = await fetch("/scan");

        if (!res.ok) {
          status.textContent = "Error: /scan returned " + res.status;
          return;
        }

        const data = await res.json();

        if (!Array.isArray(data)) {
          status.textContent = "Error: /scan did not return a list.";
          results.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
          return;
        }

        if (data.length === 0) {
          status.textContent = "Scan worked, but no results came back.";
          return;
        }

        status.textContent = "Found " + data.length + " best bets.";

        data.forEach(item => {
          const card = document.createElement("div");
          const sig = (item.signal || "").toUpperCase();

          let cls = "card pass";
          if (sig === "OBVIOUS BET") cls = "card obvious";
          else if (sig === "BET") cls = "card bet";
          else if (sig === "WATCH") cls = "card watch";
          else cls = "card pass";

          card.className = cls;

          card.innerHTML = `
            <div class="match">${item.match ?? "Unknown match"}</div>
            <div class="betline">Bet: ${item.market ?? "-"} ${item.side ?? ""}</div>
            <div class="meta">League: <strong>${item.league ?? "-"}</strong></div>
            <div class="meta">Fair Prob: <strong>${item.true_prob ?? "-"}</strong>${item.true_prob !== "-" ? "%" : ""}</div>
            <div class="meta">Best Book Prob: <strong>${item.book_prob ?? "-"}</strong>${item.book_prob !== "-" ? "%" : ""}</div>
            <div class="meta">Edge: <strong>${item.edge ?? "-"}</strong>${item.edge !== "-" ? "%" : ""}</div>
            <div class="meta">Signal: <strong>${item.signal ?? "-"}</strong></div>
            <div class="notes">Books: ${item.books ?? ""}</div>
            <div class="footer">${item.notes ?? ""}</div>
          `;

          results.appendChild(card);
        });
      } catch (err) {
        status.textContent = "JS / network error: " + err;
      }
    }

    document.getElementById("scanButton").addEventListener("click", scan);
  </script>
</body>
</html>
